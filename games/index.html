<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 42rem; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.6;
    }
    h1 { margin-bottom: 0.25rem; }
    p.lede { color: #888; margin-top: 0; }
    ul.games { list-style: none; padding: 0; }
    .games li { margin: 0.75rem 0; }
    .games a {
      display: block; padding: 1rem 1.25rem; border: 1px solid #8884; border-radius: 12px;
      text-decoration: none; color: inherit; transition: border-color .2s, transform .2s;
    }
    .games a:hover { border-color: #888; transform: translateY(-2px); }
    .games strong { font-size: 1.1rem; }
    .games span { display: block; color: #888; font-size: 0.92rem; }
  </style>
</head>
<body>
  <h1>Games</h1>
  <p class="lede">A small collection of browser games.</p>
  <ul class="games">
    <li>
      <a href="phylogenius/">
        <strong>Phylogenius Puzzles</strong>
        <span>Evolution &amp; genetics card puzzles — Timeline, Which Came First, Cladogram, Memory Match.</span>
      </a>
    </li>
  </ul>
</body>
</html>
